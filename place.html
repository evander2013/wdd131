<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Country page about Uganda featuring weather, facts, and scenery.">
    <meta name="author" content="Sebastian Evander">

    <title>Uganda Country Page</title>

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

<header>
    <h1>Welcome to Uganda</h1>
</header>

<main>

    <section class="hero">
        <picture>
            <source media="(min-width: 768px)" srcset="images/hero-large.webp">
            <img src="images/hero-small.webp" alt="Beautiful landscape in Uganda">
        </picture>
    </section>

    <section class="content">

        <article class="card">
            <h2>Data</h2>
            <p><strong>Country:</strong> Uganda</p>
            <p><strong>Capital:</strong> Kampala</p>
            <p><strong>Population:</strong> 48 Million</p>
            <p><strong>Languages:</strong> English, Luganda</p>
            <p><strong>Currency:</strong> Ugandan Shilling</p>
            <p><strong>Area:</strong> 241,038 km²</p>
            <p><strong>Famous For:</strong> Mountain Gorillas</p>
        </article>

        <article class="card weather">
            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather icon" class="weather-icon">

            <p><strong>Temperature:</strong> <span id="temperature">8</span> °C</p>
            <p><strong>Wind Speed:</strong> <span id="windspeed">10</span> km/h</p>
            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
        </article>

    </section>

</main>

<footer>
    <p>&copy; <span id="currentyear"></span> 🌍 Sebastian Evander 🌍 Uganda</p>
    <p id="lastModified"></p>
</footer>

</body>
</html>
