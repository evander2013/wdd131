<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="A responsive temple album page showcasing beautiful temples from around the world.">
    <meta name="author" content="Sebastian Evander">

    <title>Temple Album</title>

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <script src="scripts/temples.js" defer></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <div class="header-container">
        <h1>Temple Album</h1>

        <button id="menu-button">☰</button>

        <nav>
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </div>
</header>

<main>
    <h2>Temple Gallery</h2>

    <div class="gallery">

        <figure>
            <img src="images/salt-lake.jpg" alt="Salt Lake Temple">
            <figcaption>Salt Lake Temple</figcaption>
        </figure>

        <figure>
            <img src="images/rome.jpg" alt="Rome Temple">
            <figcaption>Rome Temple</figcaption>
        </figure>

        <figure>
            <img src="images/nairobi.jpg" alt="Nairobi Temple">
            <figcaption>Nairobi Temple</figcaption>
        </figure>

        <figure>
            <img src="images/accra.jpg" alt="Accra Temple">
            <figcaption>Accra Temple</figcaption>
        </figure>

        <figure>
            <img src="images/paris.webp" alt="Paris Temple">
            <figcaption>Paris Temple</figcaption>
        </figure>

        <figure>
            <img src="images/manila.jfif" alt="Manila Temple">
            <figcaption>Manila Temple</figcaption>
        </figure>

        <figure>
            <img src="images/tokyo.jpg" alt="Tokyo Temple">
            <figcaption>Tokyo Temple</figcaption>
        </figure>

        <figure>
            <img src="images/london.jfif" alt="London Temple">
            <figcaption>London Temple</figcaption>
        </figure>

        <figure>
            <img src="images/south-africa.jfif" alt="South Africa Temple">
            <figcaption>South Africa Temple</figcaption>
        </figure>

    </div>
</main>

<footer>
    <p>
        © <span id="currentyear"></span> | Sebastian Evander | Uganda
    </p>

    <p id="lastModified"></p>
</footer>

</body>
</html>
