<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A responsive temple album page showcasing temples from around the world.">
    <meta name="author" content="Sebastian Evander">

    <title>Temple Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <script src="scripts/temples.js" defer></script>
</head>

<body>

<header>
    <h1>Temple Album</h1>

    <button id="menu" aria-label="Menu"></button>

    <nav class="navigation">
        <a href="#">Home</a>
        <a href="#">Old</a>
        <a href="#">New</a>
        <a href="#">Large</a>
        <a href="#">Small</a>
    </nav>
</header>

<main>
    <section class="gallery">

        <figure>
            <img src="images/salt.jpg" alt="Salt Lake Temple">
            <figcaption>Salt Lake Temple</figcaption>
        </figure>

        <figure>
            <img src="images/rome.jpg" alt="Rome Temple">
            <figcaption>Rome Temple</figcaption>
        </figure>

        <figure>
            <img src="images/nairobi.jpg" alt="Nairobi Temple">
            <figcaption>Nairobi Temple</figcaption>
        </figure>

        <figure>
            <img src="images/accra.jpg" alt="Accra Temple">
            <figcaption>Accra Temple</figcaption>
        </figure>

        <figure>
            <img src="images/paris.webp" alt="Paris Temple">
            <figcaption>Paris Temple</figcaption>
        </figure>

        <figure>
            <img src="images/manila.jfif" alt="Manila Temple">
            <figcaption>Manila Temple</figcaption>
        </figure>

        <figure>
            <img src="images/tokyo.jpg" alt="Tokyo Temple">
            <figcaption>Tokyo Temple</figcaption>
        </figure>

        <figure>
            <img src="images/london.jfif" alt="London Temple">
            <figcaption>London Temple</figcaption>
        </figure>

        <figure>
            <img src="images/south.jfif" alt="South Africa Temple">
            <figcaption>South Africa Temple</figcaption>
        </figure>

    </section>
</main>

<footer>
    <p>© <span id="currentyear"></span> Sebastian Evander | Uganda</p>
    <p id="lastModified"></p>
</footer>

</body>
</html>
