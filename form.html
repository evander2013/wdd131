<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Review Form</title>

    <!-- FIXED: required meta tags -->
    <meta name="description" content="Product Review Form for WDD 131 Dynamic Web Fundamentals. Submit product ratings, features, and reviews.">
    <meta name="author" content="Evander Kalwanyi">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>

<header>
    <h1>Product Review</h1>
</header>

<main>
    <form action="review.html" method="get">

        <!-- PRODUCT NAME -->
        <label for="productName">Product Name <span class="required">*</span></label>
        <select id="productName" name="productName" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <!-- OVERALL RATING (FIXED) -->
        <fieldset>
            <legend>Overall Rating <span class="required">*</span></legend>

            <div class="rating-row">

                <div>
                    <input type="radio" id="star1" name="rating" value="1" required>
                    <label for="star1">1☆</label>
                </div>

                <div>
                    <input type="radio" id="star2" name="rating" value="2" required>
                    <label for="star2">2☆☆</label>
                </div>

                <div>
                    <input type="radio" id="star3" name="rating" value="3" required>
                    <label for="star3">3☆☆☆</label>
                </div>

                <div>
                    <input type="radio" id="star4" name="rating" value="4" required>
                    <label for="star4">4☆☆☆☆</label>
                </div>

                <div>
                    <input type="radio" id="star5" name="rating" value="5" required>
                    <label for="star5">5☆☆☆☆☆</label>
                </div>

            </div>
        </fieldset>

        <!-- DATE -->
        <label for="installDate">Date of Installation <span class="required">*</span></label>
        <input type="date" id="installDate" name="installDate" required>

        <!-- FEATURES -->
        <fieldset>
            <legend>Useful Features</legend>

            <div>
                <input type="checkbox" id="durability" name="features" value="Durability">
                <label for="durability">Durability</label>
            </div>

            <div>
                <input type="checkbox" id="ease" name="features" value="Ease of Use">
                <label for="ease">Ease of Use</label>
            </div>

            <div>
                <input type="checkbox" id="performance" name="features" value="Performance">
                <label for="performance">Performance</label>
            </div>

            <div>
                <input type="checkbox" id="design" name="features" value="Design">
                <label for="design">Design</label>
            </div>
        </fieldset>

        <!-- REVIEW -->
        <label for="review">Written Review</label>
        <textarea id="review" name="review" rows="5"></textarea>

        <!-- USER NAME -->
        <label for="userName">Your Name</label>
        <input type="text" id="userName" name="userName">

        <!-- SUBMIT -->
        <input type="submit" value="Post Review">

    </form>
</main>

<footer>
    <p>&copy; 2026 | Evander Kalwanyi | Uganda</p>
    <p id="lastModified"></p>
</footer>

</body>
</html>
