<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>

<header>
    <h1>Product Review</h1>
</header>

<main>
    <form action="review.html" method="get">

        <label for="productName">
            Product Name <span class="required">*</span>
        </label>
        <select id="productName" name="productName" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <fieldset class="rating-group">
            <legend>Overall Rating <span class="required">*</span></legend>

            <div class="rating-row">
                <label>
                    <input type="radio" name="rating" value="1" required>
                    <span>1☆</span>
                </label>

                <label>
                    <input type="radio" name="rating" value="2">
                    <span>2☆☆</span>
                </label>

                <label>
                    <input type="radio" name="rating" value="3">
                    <span>3☆☆☆</span>
                </label>

                <label>
                    <input type="radio" name="rating" value="4">
                    <span>4☆☆☆☆</span>
                </label>

                <label>
                    <input type="radio" name="rating" value="5">
                    <span>5☆☆☆☆☆</span>
                </label>
            </div>
        </fieldset>

        <label for="installDate">
            Date of Installation <span class="required">*</span>
        </label>
        <input type="date" id="installDate" name="installDate" required>

        <fieldset>
            <legend>Useful Features</legend>

            <label>
                <input type="checkbox" id="durability" name="features" value="Durability">
                Durability
            </label>

            <label>
                <input type="checkbox" id="ease" name="features" value="Ease of Use">
                Ease of Use
            </label>

            <label>
                <input type="checkbox" id="performance" name="features" value="Performance">
                Performance
            </label>

            <label>
                <input type="checkbox" id="design" name="features" value="Design">
                Design
            </label>
        </fieldset>

        <label for="review">Written Review</label>
        <textarea id="review" name="review" rows="5"></textarea>

        <label for="userName">Your Name</label>
        <input type="text" id="userName" name="userName">

        <input type="submit" value="Post Review">

    </form>
</main>

<footer>
    <p>&copy; 2026 | Evander Kalwanyi | Uganda</p>
    <p id="lastModified"></p>
</footer>

</body>
</html>
